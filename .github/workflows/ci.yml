name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgmp-dev libssl-dev libev-dev libffi-dev librocksdb-dev libsecp256k1-dev libsodium-dev pkg-config
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.x"
      - run: opam install . --deps-only -y
      - run: opam exec -- dune build @install

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgmp-dev libssl-dev libev-dev libffi-dev librocksdb-dev libsecp256k1-dev libsodium-dev pkg-config
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.x"
      - run: opam install . --deps-only --with-test -y
      - run: opam exec -- dune test

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: camlcoin:${{ github.sha }}
